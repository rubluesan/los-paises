<div class="auth-container fade-in">
  <div class="auth-card shadow-lg">
    <div class="auth-header">
      <h1>Inicia Sesión</h1>
      <p class="text-muted">Introduce tus credenciales para acceder.</p>
    </div>

    <form class="auth-form">
      <div class="form-group">
        <label for="email">Email</label>
        <div class="input-wrapper smooth-transition">
          <lucide-icon name="mail" class="input-icon"></lucide-icon>
          <input type="email" id="email" name="email" placeholder="tu@email.com" required />
        </div>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <div class="input-wrapper smooth-transition">
          <lucide-icon name="lock" class="input-icon"></lucide-icon>
          <input type="password" id="password" name="password" placeholder="••••••••" required />
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-block smooth-transition">
        <span>Entrar</span>
      </button>
    </form>

    <div class="auth-divider">
      <span>o continúa con</span>
    </div>

    <!-- Autenticación con Google (OAuth) -->
    <button class="btn btn-outline btn-block smooth-transition">
      <lucide-icon name="sparkles" class="icon-sm icon-orange"></lucide-icon>
      <span>Continuar con Google</span>
    </button>

    <footer class="auth-footer">
      <p>
        ¿No tienes cuenta?
        <button class="btn-link smooth-transition" routerLink="/auth/signUp">
          Regístrate aquí
        </button>
      </p>
    </footer>
  </div>
</div>
