<div class="user-menu-container">
  <button class="avatar-btn" (click)="toggleMenu()" [attr.aria-expanded]="isOpen()">
    <div class="avatar-container">
      @if (user()) {
      <img [src]="user()?.profile?.avatar_url" alt="User avatar" class="avatar-img" />
      }
    </div>
    <lucide-icon name="chevron-down" class="chevron" [class.rotated]="isOpen()"></lucide-icon>
  </button>

  @if (isOpen()) {
  <div class="dropdown-card" animate.enter="pop-in" animate.leave="pop-out" cdkTrapFocus
    (cdkTrapFocusAutoCapture)="true">
    <div class="user-info">
      <img [src]="user()?.profile?.avatar_url" alt="" class="avatar-large" />
      <div class="details">
        <span class="name">{{ user()?.profile?.username }}</span>
        <span class="email">{{ user()?.email }}</span>
      </div>
    </div>

    <hr class="divider" />

    <nav class="menu-links">
      <a routerLink="/profile" (click)="isOpen.set(false)">
        <lucide-icon name="user-pen"></lucide-icon>
        Mi Perfil
      </a>

      <button class="sign-out-btn" (click)="signOut()">
        <lucide-icon name="log-out"></lucide-icon>
        Cerrar sesión
      </button>
    </nav>
  </div>

  <div class="close-overlay" (click)="toggleMenu()"></div>
  }
</div>
