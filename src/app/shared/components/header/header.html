<div class="header-content container-fluid">

  <div class="logo flex-align-center" routerLink="/">
    <!-- <lucide-icon name="globe" class="icon-primary icon-lg"></lucide-icon> -->
    <img src="assets/brand-logo.webp" alt="Logo Los Países">
    <span class="site-title">Los Países</span>
  </div>

  <!-- Overlay borroso -->
  <div class="menu-overlay" [class.active]="isOpen()" (click)="toggleMenu()">
  </div>

  <nav class="navbar" [class.active]="isOpen()">
    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" class="nav-link">
      <lucide-icon name="home" class="icon-primary icon-md"></lucide-icon>
      <span>Inicio</span>
    </a>
    <a routerLink="/countries" routerLinkActive="active" class="nav-link">
      <lucide-icon name="binoculars" class="icon-primary icon-md"></lucide-icon>
      <span>Explorar</span>
    </a>
  </nav>

  <div class="user-menu">
    <div class="perfil">
      Perfil
    </div>

    <button class="btn-logout" title="Cerrar sesión">
      <lucide-icon name="log-out" class="icon-md"></lucide-icon>
    </button>
  </div>

  <!-- Botón hamburguesa -->
  <button class="menu-button" (click)="toggleMenu()" aria-label="Abrir menú">
    <lucide-icon name="menu" class="icon-md">
    </lucide-icon>
  </button>

  <!-- <button class="btn btn-primary btn-sm" (click)="login()">Iniciar Sesión</button> SI NO LOGEADO-->
</div>
